name: Slack Notify
description: Send a workflow result notification to Slack

inputs:
  result:
    description: 'Job result: success, warning, failure, or cancelled'
    required: true
  summary:
    description: 'Additional context to include in the message (optional)'
    required: false
    default: ''
  channel_id:
    description: 'Slack channel ID'
    required: true
  slack_bot_token:
    description: 'Slack Bot token'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Build Slack payload
      id: payload
      shell: bash
      env:
        WORKFLOW_NAME: ${{ github.workflow }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        BRANCH: ${{ github.ref_name }}
        RESULT: ${{ inputs.result }}
        SUMMARY: ${{ inputs.summary }}
        CHANNEL_ID: ${{ inputs.channel_id }}
      run: |
        # Use plain `node` (no tsx, no third-party deps) so notifications still fire
        # when the caller workflow's `npm ci` or Node setup has failed.
        JSON=$(node "${{ github.workspace }}/pipeline/scripts/pipeline/build-slack-notify-payload.mjs")
        echo "json=$JSON" >> "$GITHUB_OUTPUT"

    - name: Notify Slack
      uses: slackapi/slack-github-action@v3.0.1
      with:
        method: chat.postMessage
        token: ${{ inputs.slack_bot_token }}
        payload: ${{ steps.payload.outputs.json }}
