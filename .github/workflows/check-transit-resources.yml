name: Check Transit Resources

on:
  schedule:
    # JST 14:00 (UTC 05:00) — 1 hour after update-transit-data
    - cron: '0 5 * * *'
  workflow_dispatch:

concurrency:
  group: gtfs-pipeline
  cancel-in-progress: false

jobs:
  check-resources:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Required: actions/checkout checks out the commit that triggered
      # the run. On rerun, this is the OLD commit — the previous run's
      # push is not included. git pull fetches the latest HEAD so that
      # the subsequent git push in the commit step won't be rejected
      # as non-fast-forward.
      - name: Sync with remote
        run: git pull --ff-only origin main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Check ─────────────────────────────────────────────
      # Exit codes: 0=ok, 1=critical (EXPIRED/REMOVED/NO_VALID_DATA), 2=attention (EXPIRING_SOON/NEW_RESOURCE)
      - name: Check ODPT resources
        id: check
        run: |
          set +e
          npx tsx pipeline/scripts/analysis/check-odpt-resources.ts 2>&1 | tee check-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          cat check-output.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Warn on attention
        if: steps.check.outputs.exit_code == '2'
        run: echo "::warning::Resource check raised attention-level warnings. See Job Summary for details."

      - name: Fail on critical
        if: steps.check.outputs.exit_code == '1'
        run: |
          echo "::error::Resource check found critical issues (expired or removed data). See Job Summary for details."
          exit 1

      # ── Commit snapshot ───────────────────────────────────
      - name: Commit check snapshots
        if: always()
        run: |
          git add pipeline/state/
          if git diff --cached --quiet; then
            echo "::notice::No snapshot changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore(pipeline): update resource check snapshots"
            git push
          fi

      # ── Notify ─────────────────────────────────────────
      - name: Build check summary
        id: check-summary
        if: always()
        shell: bash
        run: |
          EXIT="${{ steps.check.outputs.exit_code }}"
          if [ "$EXIT" = "2" ]; then
            echo "result=warning" >> "$GITHUB_OUTPUT"
            echo "text=EXPIRING_SOON / NEW_RESOURCE" >> "$GITHUB_OUTPUT"
          elif [ "$EXIT" = "0" ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "text=No issues found" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "text=" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Slack
        if: always()
        uses: ./.github/actions/slack-notify
        with:
          result: ${{ steps.check-summary.outputs.result || job.status }}
          summary: ${{ steps.check-summary.outputs.text }}
          channel_id: ${{ vars.SLACK_CHANNEL_ID }}
          slack_bot_token: ${{ secrets.SLACK_BOT_TOKEN }}
