<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!--
      Pinch-zoom is disabled intentionally: Leaflet handles map zoom gestures
      directly, and browser-level zoom conflicts with pinch-to-zoom on the map,
      causing double-zoom and erratic panning. viewport-fit=cover is required
      for safe-area inset support on notched devices.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="アテナイ" />
    <link rel="icon" href="/icons/favicon.ico" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180x180.png" />
    <title>あてのない乗換案内 Athenai Transit</title>
  </head>

</html>
